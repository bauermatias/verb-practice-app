<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Irregular Verbs · Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#efe9fb; --bg-2:#fdf0e6;
    --ink:#2a2342; --muted:#8b83a6;
    --primary:#6c4de0; --primary-dark:#4f35b5;
    --accent:#ff8a3d; --accent-dark:#e9701f;
    --ok:#16a34a; --ok-bg:#e6f7ec; --ok-line:#9fe3b6;
    --bad:#e5484d; --bad-bg:#fdeaea; --bad-line:#f4b4b6;
    --hint:#2d8fe0; --hint-bg:#e6f2fc; --hint-line:#aed4f4;
    --card:#ffffff; --line:#e7e2f3;
    --radius:18px; --shadow:0 10px 30px -12px rgba(64,42,128,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 15% -10%, #ffe6d2 0%, transparent 55%),
      radial-gradient(1000px 700px at 110% 0%, #e3d8ff 0%, transparent 50%),
      linear-gradient(160deg,var(--bg-1),var(--bg-2));
    background-attachment:fixed;
    min-height:100vh;
    -webkit-text-size-adjust:100%;
    padding:0 16px calc(96px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:880px;margin:0 auto;position:relative;z-index:1}

  /* ---------- Expert mode: ember & lightning ---------- */
  body.expert-mode{
    background:
      radial-gradient(900px 520px at 12% -8%, rgba(255,96,28,.40) 0%, transparent 55%),
      radial-gradient(900px 620px at 110% 0%, rgba(124,60,255,.42) 0%, transparent 50%),
      radial-gradient(700px 500px at 50% 120%, rgba(255,180,60,.18) 0%, transparent 60%),
      linear-gradient(160deg,#2a1740,#3c1d1e);
  }
  body.expert-mode h1{color:#fff;text-shadow:0 2px 18px rgba(255,120,40,.45)}
  body.expert-mode .sub{color:#f6dcc8}
  body.expert-mode .badge{background:rgba(255,255,255,.12);color:#ffd9b8;border-color:rgba(255,255,255,.28)}
  body.expert-mode .col-head span{color:#ffba84}
  body.expert-mode footer{color:#d6c7ee}
  body.expert-mode .actionbar{background:linear-gradient(180deg,rgba(38,22,58,0),rgba(38,22,58,.94) 38%)}
  body.expert-mode .mini-score{color:#d6c7ee}

  #fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .fx-ico{position:absolute;line-height:1;opacity:.14;filter:saturate(1.25);
    animation:flicker 3s ease-in-out infinite;will-change:transform,opacity}
  @keyframes flicker{
    0%,100%{opacity:.09;transform:translateY(0) scale(1) rotate(-3deg)}
    50%{opacity:.22;transform:translateY(-12px) scale(1.1) rotate(3deg)}
  }

  /* ---------- Header ---------- */
  header{padding:26px 4px 10px;text-align:center}
  .badge{
    display:inline-flex;align-items:center;gap:7px;
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.04em;
    text-transform:uppercase;color:var(--primary-dark);
    background:#fff;border:1.5px solid var(--line);border-radius:999px;
    padding:6px 14px;box-shadow:var(--shadow)
  }
  h1{
    font-family:'Fredoka',sans-serif;font-weight:700;
    font-size:clamp(2rem,7vw,3rem);line-height:1.02;margin:.35em 0 .12em;
    letter-spacing:-.01em;
  }
  h1 .star{color:var(--accent)}
  .sub{color:var(--muted);font-weight:600;margin:0;font-size:clamp(.95rem,2.6vw,1.05rem)}

  /* ---------- Control bar ---------- */
  .controls{
    display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:center;
    margin:20px 0 6px;
  }
  .seg{
    display:inline-flex;background:#fff;border:1.5px solid var(--line);
    border-radius:999px;padding:4px;box-shadow:var(--shadow);
  }
  .seg button{
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:.92rem;
    border:0;background:transparent;color:var(--muted);
    padding:9px 15px;border-radius:999px;cursor:pointer;transition:.18s;white-space:nowrap;
  }
  .seg button .lvl{display:block;font-size:.68rem;font-weight:500;opacity:.8;margin-top:1px}
  .seg button[aria-pressed="true"]{
    background:linear-gradient(180deg,var(--primary),var(--primary-dark));
    color:#fff;box-shadow:0 6px 14px -6px var(--primary);
  }
  .btn{
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;cursor:pointer;
    border-radius:999px;padding:11px 18px;transition:.15s;border:1.5px solid var(--line);
    background:#fff;color:var(--ink);box-shadow:var(--shadow);display:inline-flex;gap:8px;align-items:center;
  }
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  #soundBtn.muted{color:var(--muted);background:#f3eff9}

  /* ---------- Progress ---------- */
  .progress-card{
    background:#fff;border:1.5px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:16px 18px;margin:14px 0 8px;
  }
  .progress-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
  .progress-label{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.05rem}
  .progress-stats{font-weight:800;color:var(--muted);font-size:.92rem}
  .progress-stats b{color:var(--ok)}
  .bar{height:14px;background:#ede8f7;border-radius:999px;overflow:hidden;position:relative}
  .bar-fill{
    height:100%;width:0;border-radius:999px;transition:width .5s cubic-bezier(.2,.8,.2,1);
    background:linear-gradient(90deg,#7c5cff,#ff8a3d);
  }

  /* ---------- Verb table ---------- */
  .col-head{
    display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:12px;
    padding:6px 14px 0;margin-top:10px;
  }
  .col-head span{
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:.82rem;
    text-transform:uppercase;letter-spacing:.05em;color:var(--primary-dark);
  }
  .list{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .row{
    display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:12px;align-items:stretch;
    background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
    padding:12px;box-shadow:0 6px 18px -14px rgba(64,42,128,.4);
  }
  .cell{display:flex;flex-direction:column;justify-content:flex-start;min-width:0}
  .clabel{display:none;font-family:'Fredoka',sans-serif;font-weight:600;font-size:.68rem;
    text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px}

  /* base cell */
  .base .word{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.18rem;line-height:1.1;
    min-height:44px;display:flex;align-items:center}
  .base .es{color:var(--accent-dark);font-weight:700;font-size:.86rem;margin-top:2px}

  /* given (locked) cell */
  .given{
    font-family:'Fredoka',sans-serif;font-weight:500;font-size:1.08rem;color:#574d75;
    background:#f6f3fc;border:1.5px dashed var(--line);border-radius:12px;
    padding:9px 12px;min-height:44px;display:flex;align-items:center;
  }

  /* input cell */
  .field{position:relative;display:flex;align-items:center}
  .field input{
    font-family:'Nunito',sans-serif;font-weight:700;font-size:1.05rem;color:var(--ink);
    width:100%;border:2px solid var(--line);border-radius:12px;
    padding:9px 40px 9px 12px;min-height:44px;background:#fff;outline:none;transition:.15s;
  }
  .field input::placeholder{color:#c8c1df;font-weight:600}
  .field input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(108,77,224,.16)}
  .field input:disabled{opacity:1}
  .hint-btn{
    position:absolute;right:6px;width:30px;height:30px;border-radius:9px;border:0;cursor:pointer;
    background:var(--hint-bg);color:var(--hint);display:grid;place-items:center;font-size:15px;transition:.15s;
  }
  .hint-btn:hover{background:#d4e8fa}
  .hint-btn:disabled{opacity:.45;cursor:default}

  /* states */
  .field.ok input{border-color:var(--ok-line);background:var(--ok-bg);color:var(--ok)}
  .field.bad input{border-color:var(--bad-line);background:var(--bad-bg);color:var(--bad)}
  .field.shown input{border-color:var(--hint-line);background:var(--hint-bg);color:var(--hint);font-style:italic}
  .field.ok .hint-btn,.field.shown .hint-btn{display:none}
  .field .mark{
    position:absolute;right:10px;font-weight:900;font-size:1.05rem;pointer-events:none;
  }
  .field.ok .mark{color:var(--ok)}
  .field.bad .mark{color:var(--bad)}

  @keyframes pop{0%{transform:scale(.85)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
  .field.ok input{animation:pop .35s ease}
  .field.bad input{animation:shake .4s ease}

  /* ---------- Sticky action bar ---------- */
  .actionbar{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(253,240,230,0),rgba(250,243,250,.92) 38%);
    backdrop-filter:blur(6px);
  }
  .actionbar-inner{
    max-width:880px;margin:0 auto;display:flex;gap:12px;align-items:center;justify-content:space-between;
  }
  .mini-score{font-family:'Fredoka',sans-serif;font-weight:600;color:var(--muted);font-size:.92rem}
  .mini-score b{color:var(--ok)}
  .check{
    flex:0 0 auto;font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.05rem;color:#fff;cursor:pointer;
    border:0;border-radius:999px;padding:14px 26px;
    background:linear-gradient(180deg,var(--accent),var(--accent-dark));
    box-shadow:0 12px 24px -10px var(--accent-dark);transition:.15s;
  }
  .check:hover{transform:translateY(-2px)}
  .check:active{transform:translateY(0)}

  footer{text-align:center;color:var(--muted);font-weight:600;font-size:.82rem;padding:18px 0 4px}

  /* ---------- Win overlay ---------- */
  .overlay{
    position:fixed;inset:0;z-index:60;display:none;place-items:center;padding:20px;
    background:rgba(42,35,66,.55);backdrop-filter:blur(3px);
  }
  .overlay.show{display:grid;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .win{
    background:#fff;border-radius:26px;max-width:380px;width:100%;text-align:center;
    padding:30px 26px;box-shadow:0 30px 60px -20px rgba(42,35,66,.6);animation:pop .4s ease;
  }
  .win .emoji{font-size:3.4rem;line-height:1}
  .win h2{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.7rem;margin:.3em 0 .15em}
  .win p{color:var(--muted);font-weight:700;margin:.2em 0 1.2em}
  .win .stars{font-size:1.8rem;letter-spacing:6px;margin-bottom:6px}

  .confetti{position:fixed;top:-12px;width:10px;height:14px;z-index:55;border-radius:2px;pointer-events:none}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}

  /* ---------- Mobile ---------- */
  @media (max-width:640px){
    .col-head{display:none}
    .row{grid-template-columns:1fr;gap:8px;padding:14px}
    .clabel{display:block}
    .base{padding-bottom:6px;border-bottom:1.5px dashed var(--line);margin-bottom:2px}
    .base .word{font-size:1.32rem}
    .base .es{font-size:.95rem}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div id="fx" aria-hidden="true"></div>
<div class="wrap">
  <header>
    <span class="badge">🚀 English practice</span>
    <h1>Irregular Verbs <span class="star">★</span></h1>
    <p class="sub">Completá las formas que faltan. Verde = correcto, rojo = revisá de nuevo.</p>
  </header>

  <div class="controls">
    <div class="seg" role="group" aria-label="Difficulty">
      <button id="easyBtn" aria-pressed="true" onclick="setMode('easy')">Easy<span class="lvl">1 hueco</span></button>
      <button id="hardBtn" aria-pressed="false" onclick="setMode('hard')">Hard<span class="lvl">2 huecos</span></button>
      <button id="expertBtn" aria-pressed="false" onclick="setMode('expert')">Expert<span class="lvl">solo español</span></button>
    </div>
    <button class="btn" onclick="newGame()">🔀 New game</button>
    <button class="btn" id="soundBtn" aria-pressed="true" onclick="toggleSound()">🔊 Sonido</button>
  </div>

  <div class="progress-card">
    <div class="progress-top">
      <span class="progress-label" id="progressLabel">Let's go!</span>
      <span class="progress-stats" id="progressStats"><b>0</b> correct</span>
    </div>
    <div class="bar"><div class="bar-fill" id="barFill"></div></div>
  </div>

  <div class="col-head">
    <span>Base form</span><span>Past simple</span><span>Past participle</span>
  </div>

  <div class="list" id="list"></div>

  <footer>Tip: tocá la 💡 al lado de un casillero si te quedaste trabado.</footer>
</div>

<div class="actionbar">
  <div class="actionbar-inner">
    <span class="mini-score" id="miniScore"><b>0</b> / 0</span>
    <button class="check" onclick="checkAll()">✓ Check answers</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)hideWin()">
  <div class="win">
    <div class="emoji">🏆</div>
    <div class="stars">★ ★ ★</div>
    <h2>¡Lo lograste!</h2>
    <p id="winMsg">You got every verb right.</p>
    <button class="check" style="width:100%" onclick="hideWin();newGame()">Play again 🔁</button>
  </div>
</div>

let audioCtx = null, fartBuffer = null, soundOn = true;
function b64ToArrayBuffer(b64){
  const bin = atob(b64); const len = bin.length; const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
async function ensureAudio(){
  if(!audioCtx){ const AC = window.AudioContext || window.webkitAudioContext; if(!AC) return false; audioCtx = new AC(); }
  if(audioCtx.state === 'suspended'){ try{ await audioCtx.resume(); }catch(e){} }
  if(!fartBuffer){
    const raw = FART_SRC.split(',')[1];
    const arr = b64ToArrayBuffer(raw);
    fartBuffer = await new Promise((res,rej)=>{
      const r = audioCtx.decodeAudioData(arr, res, rej);
      if(r && r.then) r.then(res).catch(rej);
    });
  }
  return true;
}
async function playFart(){
  if(!soundOn) return;
  try{
    const ok = await ensureAudio();
    if(ok && fartBuffer){
      const s = audioCtx.createBufferSource();
      s.buffer = fartBuffer; s.connect(audioCtx.destination); s.start(0);
      return;
    }
  }catch(e){}
  // Fallback: HTML Audio element
  try{ const a = new Audio(FART_SRC); a.play().catch(()=>{}); }catch(_){}
}
// Warm up the audio engine on the first interaction so the first play is instant.
document.addEventListener('pointerdown', function warm(){ if(soundOn) ensureAudio().catch(()=>{}); }, {once:true});
function toggleSound(){
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.innerHTML = soundOn ? '\uD83D\uDD0A Sonido' : '\uD83D\uDD07 Silencio';
  b.setAttribute('aria-pressed', soundOn);
  b.classList.toggle('muted', !soundOn);
  if(soundOn) ensureAudio().catch(()=>{});
}

let mode = 'easy';

function setMode(m){
  mode = m;
  ['easy','hard','expert'].forEach(k=>
    document.getElementById(k+'Btn').setAttribute('aria-pressed', m===k));
  document.body.classList.toggle('expert-mode', m==='expert');
  setFx(m==='expert');
  newGame();
}

// Scatter faint fire & lightning watermarks behind the page in expert mode.
function setFx(on){
  const fx = document.getElementById('fx');
  fx.innerHTML='';
  if(!on) return;
  const icons=['🔥','⚡','🔥','⚡','💥','🔥','⚡'];
  for(let i=0;i<18;i++){
    const s=document.createElement('span');
    s.className='fx-ico';
    s.textContent=icons[i%icons.length];
    s.style.left=Math.random()*100+'vw';
    s.style.top=Math.random()*100+'vh';
    s.style.fontSize=(34+Math.random()*70)+'px';
    s.style.animationDelay=(Math.random()*3)+'s';
    s.style.animationDuration=(2.4+Math.random()*2.8)+'s';
    fx.appendChild(s);
  }
}

// Decide which columns are blank for each verb.
function planBlanks(){
  return VERBS.map(()=>{
    if(mode==='expert') return ['base','past','pp'];   // remember everything from Spanish
    if(mode==='hard')   return ['past','pp'];
    return [Math.random()<0.5 ? 'past' : 'pp'];          // easy: one random blank
  });
}

function fieldLabel(field){
  return field==='base' ? 'Base form' : field==='past' ? 'Past simple' : 'Past participle';
}

function staticCell(field, text){
  return `<div class="cell">
      <span class="clabel">${fieldLabel(field)}</span>
      <div class="given">${text}</div>
    </div>`;
}

function fieldMarkup(v, field, idx){
  return `<div class="field" id="f-${idx}-${field}">
        <input type="text" inputmode="text" autocomplete="off" autocorrect="off"
               autocapitalize="none" spellcheck="false"
               aria-label="${fieldLabel(field)} for &quot;${v.es}&quot;"
               data-idx="${idx}" data-field="${field}" placeholder="…" />
        <button class="hint-btn" title="Ver respuesta" aria-label="Reveal answer"
                onclick="reveal(${idx},'${field}')">💡</button>
        <span class="mark"></span>
      </div>`;
}

function inputCell(v, field, idx){
  return `<div class="cell">
      <span class="clabel">${fieldLabel(field)}</span>
      ${fieldMarkup(v, field, idx)}
    </div>`;
}

// Base column always shows the Spanish meaning; the English word is an input only in Expert.
function baseCell(v, idx, blank){
  const top = blank ? fieldMarkup(v,'base',idx) : `<div class="word">${v.base}</div>`;
  return `<div class="cell base">
      <span class="clabel">Base form</span>
      ${top}
      <div class="es">${v.es}</div>
    </div>`;
}

function render(blanks){
  const list = document.getElementById('list');
  list.innerHTML = VERBS.map((v,i)=>{
    const isBlank = f => blanks[i].includes(f);
    const pastCell = isBlank('past') ? inputCell(v,'past',i) : staticCell('past', v.past);
    const ppCell   = isBlank('pp')   ? inputCell(v,'pp',i)   : staticCell('pp',   v.pp);
    return `<div class="row">
        ${baseCell(v, i, isBlank('base'))}
        ${pastCell}
        ${ppCell}
      </div>`;
  }).join('');

  // Enter key: jump to next input (or check if last)
  const inputs = [...list.querySelectorAll('input')];
  inputs.forEach((inp,k)=>{
    inp.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ e.preventDefault(); (inputs[k+1]||{focus:checkAll}).focus(); }
    });
    inp.addEventListener('input', ()=>{
      const wrap = inp.closest('.field');
      wrap.classList.remove('ok','bad','shown');
      wrap.querySelector('.mark').textContent='';
    });
  });
  updateScore();
}

function norm(s){
  return s.toLowerCase().replace(/\s*\/\s*/g,'/').replace(/\s+/g,' ').trim();
}
function matches(input, correct){
  const ni=norm(input), nc=norm(correct);
  if(!ni) return false;
  if(ni===nc) return true;
  // flexible match for "was / were" style answers (order-independent, any separator)
  const iw = ni.split(/[\s/]+/).filter(Boolean).sort().join(' ');
  const cw = nc.split(/[\s/]+/).filter(Boolean).sort().join(' ');
  return iw===cw;
}

function correctOf(idx, field){ return VERBS[idx][field]; }

function reveal(idx, field){
  playFart();
  const wrap = document.getElementById(`f-${idx}-${field}`);
  const inp = wrap.querySelector('input');
  inp.value = correctOf(idx, field);
  inp.disabled = true;
  wrap.classList.remove('ok','bad');
  wrap.classList.add('shown');
  wrap.querySelector('.mark').textContent='';
  updateScore();
}

function checkAll(){
  const inputs = [...document.querySelectorAll('#list input')];
  let firstWrong=null;
  inputs.forEach(inp=>{
    const wrap = inp.closest('.field');
    if(wrap.classList.contains('shown')) return;        // revealed: leave as-is
    const idx=+inp.dataset.idx, field=inp.dataset.field;
    const ok = matches(inp.value, correctOf(idx,field));
    wrap.classList.remove('ok','bad');
    if(ok){
      wrap.classList.add('ok');
      wrap.querySelector('.mark').textContent='✓';
      inp.disabled=true;
    }else{
      wrap.classList.add('bad');
      wrap.querySelector('.mark').textContent= inp.value.trim() ? '✗' : '';
      if(!firstWrong) firstWrong=inp;
    }
  });
  const done = updateScore();
  if(firstWrong){ firstWrong.focus(); }
  if(done) celebrate();
}

function updateScore(){
  const wraps=[...document.querySelectorAll('#list .field')];
  const total=wraps.length;
  const correct=wraps.filter(w=>w.classList.contains('ok')).length;
  const shown=wraps.filter(w=>w.classList.contains('shown')).length;
  const pct = total ? Math.round((correct/total)*100) : 0;

  document.getElementById('barFill').style.width = pct+'%';
  document.getElementById('progressStats').innerHTML = `<b>${correct}</b> correct${shown?` · ${shown} shown`:''}`;
  document.getElementById('miniScore').innerHTML = `<b>${correct}</b> / ${total}`;

  const lbl=document.getElementById('progressLabel');
  if(correct===total) lbl.textContent='Perfect! 🎉';
  else if(pct>=70) lbl.textContent='Almost there! 💪';
  else if(pct>=30) lbl.textContent='Keep going! 🔥';
  else lbl.textContent="Let's go!";

  return correct===total && total>0;   // all blanks correct (revealed don't count)
}

function celebrate(){
  const colors=['#6c4de0','#ff8a3d','#16a34a','#2d8fe0','#ffd23d','#e5484d'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animation=`fall ${1.6+Math.random()*1.6}s ${Math.random()*0.5}s linear forwards`;
    c.style.opacity=0.9;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3600);
  }
  document.getElementById('winMsg').textContent =
    mode==='expert' ? 'Las 3 formas de memoria, solo con el español. ¡Sos una leyenda! 🐉'
    : mode==='hard' ? 'Hard mode, all correct. ¡Crack total! 🤩'
                    : 'You got every verb right. ¡Excelente! 🌟';
  document.getElementById('overlay').classList.add('show');
}
function hideWin(){ document.getElementById('overlay').classList.remove('show'); }

function newGame(){
  hideWin();
  render(planBlanks());
  window.scrollTo({top:0,behavior:'smooth'});
}

newGame();
</script>
